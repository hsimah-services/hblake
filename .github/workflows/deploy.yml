name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package dist tarball
        run: tar -czf site.tar.gz -C dist .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="deploy-$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA:0:7}"
          gh release create "$TAG" site.tar.gz \
            --title "$TAG" \
            --notes "Auto-release from ${GITHUB_SHA:0:7}"
